name: ci

on:
  push:
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }}, rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
          - macos-15-intel
        rust:
          - "1.71"
          - "1.80"
          - "1.91"

    steps:
      - uses: actions/checkout@v4

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@${{ matrix.rust }}

      - name: Install required rustc toolchains and targets
        run: |
          rustup toolchain install 1.80 1.91
          rustup target add wasm32-unknown-unknown x86_64-unknown-linux-gnu

      - name: Run tests
        run: cargo test --workspace --all-features

      - name: Generate docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --all-features --no-deps
